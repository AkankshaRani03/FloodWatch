<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodWatch Offline</title>
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #0f172a;
            background: #f4f7fb;
        }

        .offline-card {
            max-width: 440px;
            padding: 28px;
            border: 1px solid #d9e2ec;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.6rem;
        }

        p {
            margin: 0;
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <h1>FloodWatch is offline</h1>
        <p>Please reconnect to the internet or the project server, then refresh the app.</p>
    </main>
</body>
</html>
