<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main background gradient: deep navy to teal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0b1f33"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <!-- Water wave gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- subtle radial highlight top-left -->
  <radial-gradient id="hl"/>
  <ellipse cx="130" cy="110" rx="180" ry="140"
           fill="white" fill-opacity="0.05"/>

  <!-- ── Shield body ── -->
  <path d="M256 78
           L368 128
           V256
           C368 330 310 384 256 410
           C202 384 144 330 144 256
           V128 Z"
        fill="url(#shieldGrad)"
        filter="url(#shadow)"
        opacity="0.92"/>

  <!-- Shield inner lighter border -->
  <path d="M256 100
           L350 144
           V256
           C350 320 300 368 256 392
           C212 368 162 320 162 256
           V144 Z"
        fill="none"
        stroke="rgba(255,255,255,0.18)"
        stroke-width="2"/>

  <!-- ── Warning / Alert triangle inside shield ── -->
  <!-- Triangle outline -->
  <path d="M256 170 L310 270 H202 Z"
        fill="none"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="3"
        stroke-linejoin="round"/>
  <!-- Triangle filled subtle -->
  <path d="M256 170 L310 270 H202 Z"
        fill="rgba(255,255,255,0.07)"
        stroke-linejoin="round"/>

  <!-- Exclamation mark stem -->
  <rect x="248" y="194" width="16" height="48" rx="8"
        fill="white" filter="url(#glow)"/>
  <!-- Exclamation dot -->
  <circle cx="256" cy="256" r="9"
          fill="white" filter="url(#glow)"/>

  <!-- ── Water wave ribbons below shield ── -->
  <!-- Wave 1 (back, lighter) -->
  <path d="M90 360
           C130 345 170 375 210 360
           C250 345 290 375 330 360
           C370 345 410 375 450 360"
        fill="none"
        stroke="rgba(56,189,248,0.45)"
        stroke-width="14"
        stroke-linecap="round"/>

  <!-- Wave 2 (front, brighter) -->
  <path d="M68 395
           C110 378 152 412 194 395
           C236 378 278 412 320 395
           C362 378 404 412 446 395"
        fill="none"
        stroke="url(#waveGrad)"
        stroke-width="18"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Wave 3 (bottom accent) -->
  <path d="M96 432
           C136 418 176 446 216 432
           C256 418 296 446 336 432
           C376 418 416 446 438 436"
        fill="none"
        stroke="rgba(125,211,252,0.55)"
        stroke-width="12"
        stroke-linecap="round"/>

  <!-- ── Bottom brand text area ── -->
  <!-- "FW" monogram removed — brand text is in topbar HTML -->

  <!-- ── Outer ring accent ── -->
  <rect x="6" y="6" width="500" height="500" rx="106"
        fill="none"
        stroke="rgba(255,255,255,0.10)"
        stroke-width="3"/>
</svg>
